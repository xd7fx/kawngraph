<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="kg-social-title kg-social-desc">
  <title id="kg-social-title">KawnGraph — One project universe. Every coding agent.</title>
  <desc id="kg-social-desc">Social preview: the KawnGraph universe mark beside the name KawnGraph, the line The Agent Context Universe, and the tagline One project universe, every coding agent, on a dark background.</desc>
  <rect x="0" y="0" width="1280" height="640" fill="#070A0F"/>
  <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#111923" stroke-width="2"/>
  <!-- a few restrained stars (not a dense field) -->
  <g fill="#A9B6C5">
    <circle cx="1120" cy="96" r="2" opacity="0.5"/>
    <circle cx="1190" cy="180" r="1.5" opacity="0.4"/>
    <circle cx="1044" cy="540" r="1.6" opacity="0.4"/>
    <circle cx="1160" cy="470" r="2.2" opacity="0.45"/>
    <circle cx="980" cy="120" r="1.4" opacity="0.35"/>
    <circle cx="150" cy="560" r="1.6" opacity="0.35"/>
  </g>
  <!-- universe mark, enlarged -->
  <g transform="translate(120 196) scale(3.9)">
    <g fill="none" stroke="#4C8DFF" stroke-width="1.2" opacity="0.45">
      <ellipse cx="32" cy="32" rx="23" ry="9" transform="rotate(-20 32 32)"/>
      <ellipse cx="32" cy="32" rx="10" ry="23" transform="rotate(15 32 32)"/>
    </g>
    <g stroke="#22C7A9" stroke-width="1.3" opacity="0.7" stroke-linecap="round">
      <line x1="32" y1="32" x2="42" y2="14"/>
      <line x1="32" y1="32" x2="43" y2="50"/>
      <line x1="32" y1="32" x2="11" y2="32"/>
    </g>
    <circle cx="42" cy="14" r="4.2" fill="#4C8DFF"/>
    <circle cx="43" cy="50" r="4" fill="#F6C85F"/>
    <circle cx="11" cy="32" r="4.6" fill="#42D392"/>
    <circle cx="32" cy="32" r="8.5" fill="#22C7A9"/>
    <ellipse cx="32" cy="32" rx="15" ry="5" fill="none" stroke="#F4F7FB" stroke-width="2" opacity="0.85" transform="rotate(-22 32 32)"/>
  </g>
  <!-- wordmark + tagline -->
  <text x="470" y="300" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="96" font-weight="800" letter-spacing="0.5">
    <tspan fill="#F4F7FB">Kawn</tspan><tspan fill="#22C7A9">Graph</tspan>
  </text>
  <text x="474" y="356" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="30" font-weight="600" letter-spacing="3" fill="#A9B6C5">THE AGENT CONTEXT UNIVERSE</text>
  <text x="474" y="424" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="38" font-weight="500" fill="#F4F7FB">One project universe. Every coding agent.</text>
  <text x="474" y="476" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="26" font-weight="400" fill="#A9B6C5">Evidence-backed context packs — give agents the map, not the repo.</text>
</svg>
