<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" width="960" height="470" role="img" aria-labelledby="kg-flowar-title kg-flowar-desc" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="kg-flowar-title">من المهمّة إلى حزمة السياق</title>
  <desc id="kg-flowar-desc">تدخل مهمّة («إصلاح ردّ نداء OAuth في زِد») إلى KawnGraph، فيرتّب الرسم البياني الطبقي ويعيد حزمة سياق محدودة الميزانية: ملفات واجب قراءتها، ووثائق وجداول واختبارات ومخاطر ذات صلة، وقائمة مُستبعَد، ودرجة ثقة. يقرأ الوكيل الملفات القليلة المهمّة بدل المستودع كاملًا.</desc>
  <rect x="0" y="0" width="960" height="470" rx="18" fill="#0B1118"/>
  <rect x="0.5" y="0.5" width="959" height="469" rx="17.5" fill="none" stroke="#22C7A9" stroke-opacity="0.18"/>

  <text x="928" y="44" fill="#F4F7FB" font-size="22" font-weight="700" direction="rtl" text-anchor="start">من المهمّة إلى حزمة السياق</text>
  <text x="928" y="68" fill="#A9B6C5" font-size="14" direction="rtl" text-anchor="start">اعطِ الوكلاء الخريطة لا المستودع — الملفات القليلة المهمّة ضمن ميزانية tokens.</text>

  <!-- task -->
  <g>
    <rect x="32" y="100" width="250" height="80" rx="12" fill="#111923" stroke="#4C8DFF" stroke-opacity="0.5"/>
    <text x="266" y="130" fill="#A9B6C5" font-size="12" font-weight="600" direction="rtl" text-anchor="start">المهمّة</text>
    <text x="266" y="154" fill="#F4F7FB" font-size="15" font-weight="600" direction="rtl" text-anchor="start">إصلاح ردّ نداء OAuth في زِد</text>
    <text x="48" y="172" fill="#A9B6C5" font-size="12" direction="ltr" text-anchor="start">kawn ask "fix the OAuth callback"</text>
  </g>
  <g stroke="#22C7A9" stroke-width="2" fill="#22C7A9">
    <line x1="282" y1="140" x2="330" y2="140"/>
    <polygon points="330,135 340,140 330,145"/>
  </g>

  <!-- engine -->
  <g>
    <rect x="342" y="100" width="190" height="80" rx="12" fill="#111923" stroke="#22C7A9" stroke-opacity="0.6"/>
    <text x="437" y="132" fill="#F4F7FB" font-size="15" font-weight="600" text-anchor="middle">KawnGraph</text>
    <text x="437" y="152" fill="#A9B6C5" font-size="12" text-anchor="middle" direction="rtl">ترتيب · توسيع · ميزانية</text>
    <text x="437" y="170" fill="#A9B6C5" font-size="12" text-anchor="middle" direction="rtl">حتمي، بلا LLM</text>
  </g>
  <g stroke="#22C7A9" stroke-width="2" fill="#22C7A9">
    <line x1="532" y1="140" x2="580" y2="140"/>
    <polygon points="580,135 590,140 580,145"/>
  </g>

  <!-- pack header box -->
  <g>
    <rect x="592" y="100" width="336" height="80" rx="12" fill="#070A0F" stroke="#F6C85F" stroke-opacity="0.45"/>
    <text x="912" y="130" fill="#F6C85F" font-size="13" font-weight="700" direction="rtl" text-anchor="start">حزمة السياق</text>
    <text x="912" y="152" fill="#F4F7FB" font-size="13" direction="rtl" text-anchor="start">ميزانية 8,000 tokens · ثقة 0.6</text>
    <text x="912" y="170" fill="#A9B6C5" font-size="12" direction="rtl" text-anchor="start">انسخ بصيغة Markdown / JSON / UCP</text>
  </g>

  <!-- pack contents -->
  <g font-size="13">
    <!-- must-read -->
    <rect x="32" y="210" width="896" height="70" rx="10" fill="#111923" stroke="#4C8DFF" stroke-opacity="0.45"/>
    <text x="912" y="234" fill="#9DC0FF" font-size="12" font-weight="700" direction="rtl" text-anchor="start">ملفات واجب قراءتها</text>
    <text x="48" y="256" fill="#F4F7FB" direction="ltr" text-anchor="start">app/api/zid/oauth/callback/route.ts · packages/zid/src/oauth.ts</text>
    <text x="48" y="273" fill="#F4F7FB" direction="ltr" text-anchor="start">packages/db/.../storeTokens.ts</text>

    <!-- docs + tables -->
    <rect x="32" y="290" width="442" height="64" rx="10" fill="#111923" stroke="#42D392" stroke-opacity="0.45"/>
    <text x="458" y="313" fill="#7BE3B6" font-size="12" font-weight="700" direction="rtl" text-anchor="start">وثائق</text>
    <text x="48" y="334" fill="#F4F7FB" direction="ltr" text-anchor="start">docs/zid-oauth-core.md#callback-flow</text>

    <rect x="486" y="290" width="442" height="64" rx="10" fill="#111923" stroke="#F6C85F" stroke-opacity="0.45"/>
    <text x="912" y="313" fill="#F6C85F" font-size="12" font-weight="700" direction="rtl" text-anchor="start">جداول</text>
    <text x="502" y="334" fill="#F4F7FB" direction="ltr" text-anchor="start">store_tokens (writes) · merchants (fk)</text>

    <!-- tests + risks -->
    <rect x="32" y="364" width="442" height="64" rx="10" fill="#111923" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <text x="458" y="387" fill="#5FE6D5" font-size="12" font-weight="700" direction="rtl" text-anchor="start">اختبارات</text>
    <text x="48" y="408" fill="#F4F7FB" direction="ltr" text-anchor="start">oauth.test.ts</text>

    <rect x="486" y="364" width="442" height="64" rx="10" fill="#111923" stroke="#FF6B6B" stroke-opacity="0.45"/>
    <text x="912" y="387" fill="#FF8F8F" font-size="12" font-weight="700" direction="rtl" text-anchor="start">مخاطر ومُستبعَد</text>
    <text x="912" y="408" fill="#F4F7FB" direction="rtl" text-anchor="start">تشفير الـtokens · عزل المستأجرين · (مُستبعَد: الواجهة)</text>
  </g>

  <text x="928" y="452" fill="#A9B6C5" font-size="12" direction="rtl" text-anchor="start">شكلٌ توضيحي للحزمة؛ أسماء الملفات تحاكي الشرح في README. الحِزَم الحقيقية تُولَّد من رسمك الممسوح.</text>
</svg>
