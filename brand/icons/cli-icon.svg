<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="kg-cli-title kg-cli-desc">
  <title id="kg-cli-title">KawnGraph CLI</title>
  <desc id="kg-cli-desc">A terminal prompt glyph with the KawnGraph universe mark as a corner badge.</desc>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#070A0F"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#22C7A9" stroke-opacity="0.18"/>
  <!-- prompt: chevron + cursor -->
  <path d="M14 22L28 33L14 44" fill="none" stroke="#22C7A9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="32" y="39" width="16" height="6" rx="3" fill="#F6C85F"/>
  <!-- universe mark badge, top-right -->
  <g transform="translate(48 14) scale(0.30) translate(-32 -32)">
    <g stroke="#22C7A9" stroke-width="3" opacity="0.7" stroke-linecap="round">
      <line x1="32" y1="32" x2="42" y2="14"/>
      <line x1="32" y1="32" x2="43" y2="50"/>
      <line x1="32" y1="32" x2="11" y2="32"/>
    </g>
    <circle cx="42" cy="14" r="6" fill="#4C8DFF"/>
    <circle cx="43" cy="50" r="5.6" fill="#F6C85F"/>
    <circle cx="11" cy="32" r="6.2" fill="#42D392"/>
    <circle cx="32" cy="32" r="11" fill="#22C7A9"/>
    <ellipse cx="32" cy="32" rx="18" ry="6" fill="none" stroke="#F4F7FB" stroke-width="3" opacity="0.85" transform="rotate(-22 32 32)"/>
  </g>
</svg>
