<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KawnGraph CLI">
  <title>KawnGraph CLI</title>
  <desc>A terminal prompt glyph with the KawnGraph mark badge.</desc>
  <defs>
    <linearGradient id="kgcliEdge" x1="16" y1="16" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="kgcliAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0B1118"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#22C7A9" stroke-opacity="0.18"/>

  <!-- prompt: chevron + cursor -->
  <path d="M16 22L30 33L16 44" fill="none" stroke="#22C7A9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="39" width="16" height="6" rx="3" fill="#F6C85F"/>

  <!-- mark badge, top-right corner -->
  <g transform="translate(50,13) scale(0.34) translate(-33,-32)">
    <g fill="none" stroke="url(#kgcliEdge)" stroke-width="6" stroke-linecap="round">
      <line x1="20" y1="14" x2="20" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="50"/>
    </g>
    <line x1="20" y1="32" x2="46" y2="14" fill="none" stroke="#F6C85F" stroke-width="6" stroke-linecap="round"/>
    <circle cx="20" cy="14" r="6" fill="#4C8DFF"/>
    <circle cx="20" cy="50" r="6" fill="#22C7A9"/>
    <circle cx="46" cy="50" r="6" fill="#4C8DFF"/>
    <circle cx="46" cy="14" r="6" fill="#F6C85F"/>
    <circle cx="20" cy="32" r="8.5" fill="url(#kgcliAnchor)"/>
  </g>
</svg>
