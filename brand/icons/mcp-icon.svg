<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KawnGraph MCP server">
  <title>KawnGraph MCP</title>
  <desc>The mark with a connector badge, marking the read-only MCP server.</desc>
  <defs>
    <linearGradient id="kgmEdge" x1="16" y1="16" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="kgmAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0B1118"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#22C7A9" stroke-opacity="0.18"/>

  <!-- mark, nudged up-left to clear the connector badge -->
  <g transform="translate(29,28) scale(0.92) translate(-33,-32)">
    <g fill="none" stroke="url(#kgmEdge)" stroke-width="4" stroke-linecap="round">
      <line x1="20" y1="14" x2="20" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="50"/>
    </g>
    <line x1="20" y1="32" x2="46" y2="14" fill="none" stroke="#F6C85F" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="14" r="4.5" fill="#4C8DFF"/>
    <circle cx="20" cy="50" r="4.5" fill="#22C7A9"/>
    <circle cx="46" cy="50" r="4.5" fill="#4C8DFF"/>
    <circle cx="46" cy="14" r="4.5" fill="#F6C85F"/>
    <circle cx="20" cy="32" r="6.5" fill="url(#kgmAnchor)"/>
  </g>

  <!-- connector badge: a plug entering a port -->
  <g transform="translate(48,48)">
    <circle cx="0" cy="0" r="12" fill="#4C8DFF"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#0B1118" stroke-width="2"/>
    <g fill="none" stroke="#0B1118" stroke-width="2" stroke-linecap="round">
      <path d="M-5 -3V0M0 -6V0"/>
      <path d="M-7 0H2a3 3 0 0 1 3 3 4 4 0 0 1 -4 4H-3"/>
      <path d="M-3 7V10"/>
    </g>
  </g>
</svg>
