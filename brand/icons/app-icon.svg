<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KawnGraph">
  <title>KawnGraph app icon</title>
  <defs>
    <linearGradient id="kgApBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111923"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <radialGradient id="kgApGlow" cx="0.5" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#22C7A9" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22C7A9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kgApEdge" x1="150" y1="150" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="kgApAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#kgApBg)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#F4F7FB" stroke-opacity="0.06"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#kgApGlow)"/>

  <!-- subtle orbit ring -->
  <ellipse cx="256" cy="256" rx="186" ry="150" fill="none" stroke="#4C8DFF" stroke-opacity="0.16" stroke-width="2" transform="rotate(-24 256 256)"/>

  <!-- mark, scaled ~5.4× onto the 64-grid and centred -->
  <g transform="translate(256,256) scale(5.4) translate(-33,-32)">
    <g fill="none" stroke="url(#kgApEdge)" stroke-width="4" stroke-linecap="round">
      <line x1="20" y1="14" x2="20" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="50"/>
    </g>
    <line x1="20" y1="32" x2="46" y2="14" fill="none" stroke="#F6C85F" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="14" r="4.5" fill="#4C8DFF"/>
    <circle cx="20" cy="50" r="4.5" fill="#22C7A9"/>
    <circle cx="46" cy="50" r="4.5" fill="#4C8DFF"/>
    <circle cx="46" cy="14" r="4.5" fill="#F6C85F"/>
    <circle cx="20" cy="32" r="6.5" fill="url(#kgApAnchor)"/>
  </g>
</svg>
