<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="KawnGraph — One project universe. Every coding agent.">
  <title>KawnGraph — The Agent Context Universe</title>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1118"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="0.16" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#22C7A9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22C7A9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogEdge" x1="16" y1="16" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="ogAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow)"/>

  <!-- faint constellation backdrop -->
  <g stroke="#4C8DFF" stroke-opacity="0.18" stroke-width="1.5" fill="#4C8DFF" fill-opacity="0.4">
    <path d="M905 90L1010 150M1010 150L1075 96M1010 150L995 250M995 250L1110 300"/>
    <circle cx="905" cy="90" r="4"/>
    <circle cx="1010" cy="150" r="5"/>
    <circle cx="1075" cy="96" r="4"/>
    <circle cx="995" cy="250" r="4"/>
    <circle cx="1110" cy="300" r="4"/>
  </g>

  <!-- mark -->
  <g transform="translate(132,250) scale(3.4) translate(-33,-32)">
    <g fill="none" stroke="url(#ogEdge)" stroke-width="4" stroke-linecap="round">
      <line x1="20" y1="14" x2="20" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="50"/>
    </g>
    <line x1="20" y1="32" x2="46" y2="14" fill="none" stroke="#F6C85F" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="14" r="4.5" fill="#4C8DFF"/>
    <circle cx="20" cy="50" r="4.5" fill="#22C7A9"/>
    <circle cx="46" cy="50" r="4.5" fill="#4C8DFF"/>
    <circle cx="46" cy="14" r="4.5" fill="#F6C85F"/>
    <circle cx="20" cy="32" r="6.5" fill="url(#ogAnchor)"/>
  </g>

  <text x="232" y="212" font-family="Inter, 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
        font-size="24" font-weight="600" letter-spacing="6" fill="#22C7A9">THE AGENT CONTEXT UNIVERSE</text>
  <text x="230" y="300" font-family="Inter, 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2"><tspan fill="#22C7A9">Kawn</tspan><tspan fill="#F4F7FB">Graph</tspan></text>
  <text x="234" y="358" font-family="Inter, 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="400" fill="#A9B6C5">One project universe. Every coding agent.</text>

  <!-- setup chip -->
  <g transform="translate(234,404)">
    <rect width="372" height="58" rx="12" fill="#17212D" stroke="#22C7A9" stroke-opacity="0.35"/>
    <text x="22" y="38" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Code', Consolas, monospace"
          font-size="26" fill="#F4F7FB"><tspan fill="#22C7A9">›</tspan> npx kawngraph setup</text>
  </g>

  <!-- Arabic accent -->
  <text x="1040" y="560" text-anchor="middle" style="direction:rtl"
        font-family="'IBM Plex Sans Arabic', 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif"
        font-size="52" font-weight="600" fill="#22C7A9">كون قراف</text>
</svg>
