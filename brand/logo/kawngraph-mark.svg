<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KawnGraph">
  <title>KawnGraph</title>
  <desc>A geometric K constructed from connected orbital nodes around a central anchor, with one highlighted evidence path.</desc>
  <defs>
    <linearGradient id="kgEdge" x1="16" y1="16" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="kgAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <!-- graph edges (the "K" skeleton): vertical spine + lower diagonal -->
  <g fill="none" stroke="url(#kgEdge)" stroke-width="4" stroke-linecap="round">
    <line x1="20" y1="14" x2="20" y2="50"/>
    <line x1="20" y1="32" x2="46" y2="50"/>
  </g>

  <!-- the one visible evidence path (upper diagonal) -->
  <line x1="20" y1="32" x2="46" y2="14" fill="none" stroke="#F6C85F" stroke-width="4" stroke-linecap="round"/>

  <!-- orbital nodes -->
  <circle cx="20" cy="14" r="4.5" fill="#4C8DFF"/>
  <circle cx="20" cy="50" r="4.5" fill="#22C7A9"/>
  <circle cx="46" cy="50" r="4.5" fill="#4C8DFF"/>
  <circle cx="46" cy="14" r="4.5" fill="#F6C85F"/>

  <!-- central anchor node -->
  <circle cx="20" cy="32" r="6.5" fill="url(#kgAnchor)"/>
</svg>
