<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="KawnGraph mark construction">
  <title>KawnGraph mark — construction</title>
  <desc>Geometry sheet: the mark is built on a 30-unit grid from five orbital nodes around a central anchor.</desc>
  <defs>
    <linearGradient id="kgcEdge" x1="96" y1="96" x2="250" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7A9"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <radialGradient id="kgcAnchor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3BE7C4"/>
      <stop offset="1" stop-color="#22C7A9"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="360" height="360" rx="20" fill="#0B1118"/>

  <!-- 30-unit blueprint grid -->
  <g stroke="#22C7A9" stroke-width="0.5" opacity="0.14">
    <path d="M30 0V360M60 0V360M90 0V360M120 0V360M150 0V360M180 0V360M210 0V360M240 0V360M270 0V360M300 0V360M330 0V360"/>
    <path d="M0 30H360M0 60H360M0 90H360M0 120H360M0 150H360M0 180H360M0 210H360M0 240H360M0 270H360M0 300H360M0 330H360"/>
  </g>

  <!-- node construction rings + crosshairs -->
  <g fill="none" stroke="#4C8DFF" stroke-width="0.75" opacity="0.5">
    <circle cx="130" cy="96" r="30"/>
    <circle cx="130" cy="264" r="30"/>
    <circle cx="250" cy="96" r="30"/>
    <circle cx="250" cy="264" r="30"/>
    <circle cx="130" cy="180" r="40"/>
    <path d="M130 56V304M250 66V294"/>
    <path d="M90 96H290M90 264H290M90 180H170"/>
  </g>

  <!-- the mark itself, scaled onto the grid -->
  <g fill="none" stroke="url(#kgcEdge)" stroke-width="9" stroke-linecap="round">
    <line x1="130" y1="96" x2="130" y2="264"/>
    <line x1="130" y1="180" x2="250" y2="264"/>
  </g>
  <line x1="130" y1="180" x2="250" y2="96" fill="none" stroke="#F6C85F" stroke-width="9" stroke-linecap="round"/>
  <circle cx="130" cy="96" r="13" fill="#4C8DFF"/>
  <circle cx="130" cy="264" r="13" fill="#22C7A9"/>
  <circle cx="250" cy="264" r="13" fill="#4C8DFF"/>
  <circle cx="250" cy="96" r="13" fill="#F6C85F"/>
  <circle cx="130" cy="180" r="19" fill="url(#kgcAnchor)"/>
</svg>
