<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" role="img" aria-label="KawnGraph" color="#F4F7FB">
  <title>KawnGraph (monochrome)</title>
  <desc>Single-colour lockup. Set the ink with the CSS `color` property; defaults to light ink for dark backgrounds.</desc>

  <g transform="translate(6,4)" fill="currentColor" stroke="currentColor">
    <g fill="none" stroke-width="4" stroke-linecap="round">
      <line x1="20" y1="14" x2="20" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="50"/>
      <line x1="20" y1="32" x2="46" y2="14"/>
    </g>
    <circle cx="20" cy="14" r="4.5" stroke="none"/>
    <circle cx="20" cy="50" r="4.5" stroke="none"/>
    <circle cx="46" cy="50" r="4.5" stroke="none"/>
    <!-- evidence endpoint stays hollow so the highlighted path still reads in one colour -->
    <circle cx="46" cy="14" r="4" fill="none" stroke-width="2.5"/>
    <circle cx="20" cy="32" r="6.5" stroke="none"/>
  </g>

  <text x="84" y="47" fill="currentColor"
        font-family="Inter, 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.5">KawnGraph</text>
</svg>
